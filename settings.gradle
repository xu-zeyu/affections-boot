include 'jinHan-gold:jinHan-gold-core'


include 'affections-boot-start:affections-boot-starter-file'
findProject(':affections-boot-start:affections-boot-starter-file')?.name = 'affections-boot-starter-file'

include 'affections-boot-start:affections-boot-starter-mybatis'
findProject(':affections-boot-start:affections-boot-starter-mybatis')?.name = 'affections-boot-starter-mybatis'
include 'affections-boot-auth'
include 'affections-boot-start:affections-boot-starter-cache'
findProject(':affections-boot-start:affections-boot-starter-cache')?.name = 'affections-boot-starter-cache'

include 'affections-boot-start:affections-boot-starter-log'
findProject(':affections-boot-start:affections-boot-starter-log')?.name = 'affections-boot-starter-log'

include 'affections-boot-start:affections-boot-starter-config'
findProject(':affections-boot-start:affections-boot-starter-config')?.name = 'affections-boot-starter-config'

