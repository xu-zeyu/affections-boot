// 定义根项目名称
rootProject.name = 'affections-boot'

// 包含公共模块
include 'affections-boot-common'
include 'affections-boot-auth'

// 包含业务公共模块（父子工程）
include 'affections-boot-start'
project(':affections-boot-start').projectDir = file('affections-boot-start')

// 包含业务模块（父子工程）
include 'jinHan-gold'
project(':jinHan-gold').projectDir = file('jinHan-gold')

// 包含 jinHan-gold 下的子模块
include 'jinHan-gold:jinHan-gold-admin-web'
